<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 580" fill="none" role="img" aria-label="Casio fx-880BTG ClassWiz">
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2D33"/>
      <stop offset="1" stop-color="#0E0F12"/>
    </linearGradient>
    <linearGradient id="topG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A3D44"/>
      <stop offset="1" stop-color="#1A1C20"/>
    </linearGradient>
    <linearGradient id="screenG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B7CFA4"/>
      <stop offset="1" stop-color="#8DAB78"/>
    </linearGradient>
    <linearGradient id="solarG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1A2640"/>
      <stop offset="1" stop-color="#0A1224"/>
    </linearGradient>
    <filter id="bodyShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0A2A5E" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Body -->
  <g filter="url(#bodyShadow)">
    <rect x="20" y="20" width="340" height="540" rx="22" fill="url(#bodyG)"/>
    <!-- subtle highlight -->
    <rect x="20" y="20" width="340" height="540" rx="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>

  <!-- Top panel (charcoal) -->
  <rect x="36" y="36" width="308" height="230" rx="14" fill="url(#topG)"/>

  <!-- Solar strip -->
  <rect x="56" y="52" width="124" height="16" rx="2" fill="url(#solarG)"/>
  <g stroke="rgba(255,255,255,0.15)" stroke-width="0.5">
    <line x1="56" y1="60" x2="180" y2="60"/>
    <line x1="80" y1="52" x2="80" y2="68"/>
    <line x1="104" y1="52" x2="104" y2="68"/>
    <line x1="128" y1="52" x2="128" y2="68"/>
    <line x1="152" y1="52" x2="152" y2="68"/>
  </g>

  <!-- CASIO logo top right -->
  <text x="330" y="63" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1">CASIO</text>

  <!-- Screen -->
  <rect x="56" y="84" width="268" height="148" rx="6" fill="url(#screenG)" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
  <!-- Screen content -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0E1A0A">
    <text x="72" y="112" font-size="11" font-weight="600">Math RAD</text>
    <text x="312" y="112" font-size="11" font-weight="600" text-anchor="end">D</text>
    <text x="72" y="155" font-size="22" font-weight="700">∫₀^π sin(x) dx</text>
    <text x="72" y="195" font-size="26" font-weight="700" text-anchor="start">=</text>
    <text x="312" y="195" font-size="32" font-weight="800" text-anchor="end">2</text>
    <text x="72" y="220" font-size="10" font-weight="500">CLASSWIZ • HIGH-RES</text>
  </g>

  <!-- Model label -->
  <text x="56" y="252" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="0.5">fx-880BTG ClassWiz</text>

  <!-- Key area -->
  <g transform="translate(56,278)">
    <!-- Function keys row (5x1) -->
    <g>
      <rect x="0"   y="0" width="44" height="24" rx="4" fill="#3A3D44"/>
      <rect x="56"  y="0" width="44" height="24" rx="4" fill="#3A3D44"/>
      <rect x="112" y="0" width="44" height="24" rx="4" fill="#3A3D44"/>
      <rect x="168" y="0" width="44" height="24" rx="4" fill="#3A3D44"/>
      <rect x="224" y="0" width="44" height="24" rx="4" fill="#3A3D44"/>
    </g>

    <!-- Navigation cluster -->
    <g transform="translate(112, 38)">
      <circle cx="22" cy="22" r="36" fill="#2A2D33" stroke="rgba(255,255,255,0.06)"/>
      <polygon points="22,4 28,16 16,16" fill="#9CA3AF"/>
      <polygon points="22,40 28,28 16,28" fill="#9CA3AF"/>
      <polygon points="4,22 16,16 16,28" fill="#9CA3AF"/>
      <polygon points="40,22 28,16 28,28" fill="#9CA3AF"/>
      <rect x="18" y="18" width="8" height="8" rx="1.5" fill="#FFFFFF"/>
    </g>

    <!-- Side function keys around nav -->
    <g>
      <rect x="0"   y="44" width="44" height="22" rx="4" fill="#3A3D44"/>
      <rect x="56"  y="44" width="44" height="22" rx="4" fill="#3A3D44"/>
      <rect x="224" y="44" width="44" height="22" rx="4" fill="#3A3D44"/>
      <rect x="168" y="44" width="44" height="22" rx="4" fill="#3A3D44"/>

      <rect x="0"   y="74" width="44" height="22" rx="4" fill="#3A3D44"/>
      <rect x="56"  y="74" width="44" height="22" rx="4" fill="#3A3D44"/>
      <rect x="168" y="74" width="44" height="22" rx="4" fill="#3A3D44"/>
      <rect x="224" y="74" width="44" height="22" rx="4" fill="#3A3D44"/>
    </g>

    <!-- Number/operator grid (5 rows x 5 cols) -->
    <g transform="translate(0, 110)">
      <!-- Row 1: shift / alpha / function -->
      <rect x="0"   y="0"  width="44" height="26" rx="5" fill="#E5B048"/>
      <rect x="56"  y="0"  width="44" height="26" rx="5" fill="#E03B49"/>
      <rect x="112" y="0"  width="44" height="26" rx="5" fill="#3A3D44"/>
      <rect x="168" y="0"  width="44" height="26" rx="5" fill="#3A3D44"/>
      <rect x="224" y="0"  width="44" height="26" rx="5" fill="#3A3D44"/>

      <!-- Rows 2-5: number/operator pads -->
      <g fill="#FFFFFF">
        <rect x="0"   y="38" width="44" height="28" rx="5"/>
        <rect x="56"  y="38" width="44" height="28" rx="5"/>
        <rect x="112" y="38" width="44" height="28" rx="5"/>
        <rect x="168" y="38" width="44" height="28" rx="5"/>
        <rect x="224" y="38" width="44" height="28" rx="5" fill="#E03B49"/>

        <rect x="0"   y="76" width="44" height="28" rx="5"/>
        <rect x="56"  y="76" width="44" height="28" rx="5"/>
        <rect x="112" y="76" width="44" height="28" rx="5"/>
        <rect x="168" y="76" width="44" height="28" rx="5"/>
        <rect x="224" y="76" width="44" height="28" rx="5" fill="#E03B49"/>

        <rect x="0"   y="114" width="44" height="28" rx="5"/>
        <rect x="56"  y="114" width="44" height="28" rx="5"/>
        <rect x="112" y="114" width="44" height="28" rx="5"/>
        <rect x="168" y="114" width="44" height="28" rx="5"/>
        <rect x="224" y="114" width="44" height="28" rx="5" fill="#E03B49"/>

        <rect x="0"   y="152" width="100" height="28" rx="5"/>
        <rect x="112" y="152" width="44" height="28" rx="5"/>
        <rect x="168" y="152" width="44" height="28" rx="5"/>
        <rect x="224" y="152" width="44" height="28" rx="5" fill="#E03B49"/>
      </g>
    </g>
  </g>

  <!-- Bottom hint glow -->
  <ellipse cx="190" cy="568" rx="120" ry="6" fill="#0A2A5E" opacity="0.15"/>
</svg>
