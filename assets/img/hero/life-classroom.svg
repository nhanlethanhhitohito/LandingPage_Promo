<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Học sinh trong lớp học">
  <defs>
    <linearGradient id="lc1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7EA4D0"/>
      <stop offset="1" stop-color="#3F6FA8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#lc1)"/>
  <!-- Window light -->
  <rect x="40" y="40" width="280" height="200" rx="6" fill="rgba(255,255,255,0.18)"/>
  <line x1="180" y1="40" x2="180" y2="240" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <line x1="40" y1="140" x2="320" y2="140" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <!-- Whiteboard -->
  <rect x="380" y="60" width="380" height="160" rx="4" fill="#FAFBFC"/>
  <g stroke="#0A2A5E" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 410 110 Q 460 70 510 110 T 610 110"/>
    <text x="410" y="160" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0A2A5E">y = sin(x)</text>
    <text x="410" y="195" font-family="Inter, sans-serif" font-size="14" fill="#0A2A5E">∫₀^π sin(x) dx = 2</text>
  </g>
  <!-- Desk -->
  <rect x="0" y="420" width="800" height="180" fill="rgba(0,0,0,0.25)"/>
  <!-- Calculator silhouette -->
  <g transform="translate(330,380)">
    <rect width="140" height="200" rx="12" fill="#0E0F12"/>
    <rect x="14" y="20" width="112" height="64" rx="4" fill="#B7CFA4"/>
    <g fill="#3A3D44">
      <rect x="14" y="100" width="24" height="14" rx="2"/>
      <rect x="44" y="100" width="24" height="14" rx="2"/>
      <rect x="74" y="100" width="24" height="14" rx="2"/>
      <rect x="104" y="100" width="22" height="14" rx="2"/>
      <rect x="14" y="124" width="24" height="14" rx="2"/>
      <rect x="44" y="124" width="24" height="14" rx="2"/>
      <rect x="74" y="124" width="24" height="14" rx="2"/>
      <rect x="104" y="124" width="22" height="14" rx="2"/>
      <rect x="14" y="148" width="24" height="14" rx="2"/>
      <rect x="44" y="148" width="24" height="14" rx="2"/>
      <rect x="74" y="148" width="24" height="14" rx="2"/>
      <rect x="104" y="148" width="22" height="14" rx="2" fill="#E03B49"/>
      <rect x="14" y="172" width="24" height="14" rx="2"/>
      <rect x="44" y="172" width="24" height="14" rx="2"/>
      <rect x="74" y="172" width="24" height="14" rx="2"/>
      <rect x="104" y="172" width="22" height="14" rx="2" fill="#E03B49"/>
    </g>
  </g>
  <!-- Hand silhouette -->
  <path d="M 280 600 Q 320 480 380 470 L 430 470 Q 460 470 460 500 L 460 600 Z" fill="rgba(0,0,0,0.45)"/>
</svg>
