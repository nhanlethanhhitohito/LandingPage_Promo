<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Pin năng lượng mặt trời">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF7E5"/>
      <stop offset="1" stop-color="#FFE9B0"/>
    </linearGradient>
    <radialGradient id="sunG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD66B"/>
      <stop offset="1" stop-color="#F2A93B"/>
    </radialGradient>
  </defs>
  <rect width="640" height="480" rx="16" fill="url(#bgS)"/>

  <!-- Sun rays -->
  <g stroke="#F2A93B" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="180" y1="60"  x2="180" y2="100"/>
    <line x1="180" y1="320" x2="180" y2="360"/>
    <line x1="40"  y1="210" x2="80"  y2="210"/>
    <line x1="280" y1="210" x2="320" y2="210"/>
    <line x1="82"  y1="112" x2="112" y2="142"/>
    <line x1="248" y1="278" x2="278" y2="308"/>
    <line x1="82"  y1="308" x2="112" y2="278"/>
    <line x1="248" y1="142" x2="278" y2="112"/>
  </g>
  <circle cx="180" cy="210" r="60" fill="url(#sunG)"/>

  <!-- Solar panel strip with cells -->
  <g transform="translate(360,150)">
    <rect width="220" height="60" rx="6" fill="#0A1B40"/>
    <g stroke="rgba(255,255,255,0.18)" stroke-width="1">
      <line x1="0" y1="30" x2="220" y2="30"/>
      <line x1="44"  y1="0" x2="44"  y2="60"/>
      <line x1="88"  y1="0" x2="88"  y2="60"/>
      <line x1="132" y1="0" x2="132" y2="60"/>
      <line x1="176" y1="0" x2="176" y2="60"/>
    </g>
  </g>

  <!-- Battery indicator -->
  <g transform="translate(360,260)">
    <rect width="180" height="56" rx="10" fill="#0A2A5E"/>
    <rect x="180" y="18" width="8" height="20" rx="2" fill="#0A2A5E"/>
    <rect x="8" y="8" width="164" height="40" rx="6" fill="#2DD27D"/>
    <text x="90" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">100%</text>
  </g>

  <g fill="rgba(10,42,94,0.55)" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0.1em">
    <text x="60" y="60">SOLAR + BATTERY</text>
  </g>
  <text x="60" y="430" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0A2A5E">Pin năng lượng mặt trời • Hoạt động kể cả khi pin yếu</text>
</svg>
