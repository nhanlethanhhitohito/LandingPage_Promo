<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="ClassWiz App kết nối QR Code">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1A36"/>
      <stop offset="1" stop-color="#061A3D"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" rx="16" fill="url(#bgA)"/>

  <!-- Phone mockup -->
  <g transform="translate(360,80)">
    <rect width="200" height="340" rx="28" fill="#0A0E1A" stroke="rgba(255,255,255,0.15)"/>
    <rect x="12" y="20" width="176" height="300" rx="14" fill="#1B2F58"/>
    <circle cx="100" cy="14" r="3" fill="rgba(255,255,255,0.3)"/>
    <g transform="translate(28,40)" fill="#fff" font-family="Inter, Arial, sans-serif">
      <text font-size="11" font-weight="600" opacity="0.6">CLASSWIZ APP</text>
      <text y="22" font-size="16" font-weight="700">Đồ thị hàm số</text>
      <rect x="0" y="36" width="144" height="160" rx="8" fill="rgba(255,255,255,0.06)"/>
      <path d="M 8 116 Q 36 60, 72 116 T 136 116" stroke="#E30613" stroke-width="2.5" fill="none"/>
      <line x1="8" y1="116" x2="136" y2="116" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <line x1="72" y1="44" x2="72" y2="188" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <text y="220" font-size="11" font-weight="600">f(x) = sin(x)</text>
      <text y="238" font-size="10" font-weight="500" opacity="0.65">Đồng bộ qua QR Code</text>
    </g>
  </g>

  <!-- QR code -->
  <g transform="translate(80,150)" fill="#fff">
    <rect width="180" height="180" rx="12" fill="#fff"/>
    <g transform="translate(20,20)" fill="#0A0E1A">
      <!-- finder squares -->
      <rect width="36" height="36"/>
      <rect x="6" y="6" width="24" height="24" fill="#fff"/>
      <rect x="12" y="12" width="12" height="12" fill="#0A0E1A"/>

      <rect x="104" width="36" height="36"/>
      <rect x="110" y="6" width="24" height="24" fill="#fff"/>
      <rect x="116" y="12" width="12" height="12" fill="#0A0E1A"/>

      <rect y="104" width="36" height="36"/>
      <rect x="6" y="110" width="24" height="24" fill="#fff"/>
      <rect x="12" y="116" width="12" height="12" fill="#0A0E1A"/>

      <!-- random data dots -->
      <g>
        <rect x="48" y="0"  width="8" height="8"/>
        <rect x="64" y="0"  width="8" height="8"/>
        <rect x="80" y="0"  width="8" height="8"/>
        <rect x="48" y="16" width="8" height="8"/>
        <rect x="80" y="16" width="8" height="8"/>
        <rect x="56" y="32" width="8" height="8"/>
        <rect x="72" y="32" width="8" height="8"/>
        <rect x="96" y="32" width="8" height="8"/>
        <rect x="48" y="48" width="8" height="8"/>
        <rect x="64" y="48" width="8" height="8"/>
        <rect x="80" y="48" width="8" height="8"/>
        <rect x="96" y="48" width="8" height="8"/>
        <rect x="0"  y="48" width="8" height="8"/>
        <rect x="0"  y="64" width="8" height="8"/>
        <rect x="16" y="64" width="8" height="8"/>
        <rect x="32" y="64" width="8" height="8"/>
        <rect x="56" y="64" width="8" height="8"/>
        <rect x="88" y="64" width="8" height="8"/>
        <rect x="112" y="64" width="8" height="8"/>
        <rect x="128" y="48" width="8" height="8"/>
        <rect x="128" y="80" width="8" height="8"/>
        <rect x="48" y="80" width="8" height="8"/>
        <rect x="80" y="80" width="8" height="8"/>
        <rect x="64" y="96" width="8" height="8"/>
        <rect x="96" y="96" width="8" height="8"/>
        <rect x="112" y="96" width="8" height="8"/>
        <rect x="48" y="112" width="8" height="8"/>
        <rect x="64" y="112" width="8" height="8"/>
        <rect x="96" y="112" width="8" height="8"/>
        <rect x="48" y="128" width="8" height="8"/>
        <rect x="80" y="128" width="8" height="8"/>
        <rect x="112" y="128" width="8" height="8"/>
        <rect x="128" y="112" width="8" height="8"/>
      </g>
    </g>
  </g>

  <!-- Connecting line -->
  <line x1="260" y1="240" x2="360" y2="240" stroke="#E30613" stroke-width="2" stroke-dasharray="6 6"/>
  <circle cx="360" cy="240" r="6" fill="#E30613"/>

  <g fill="rgba(255,255,255,0.5)" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0.1em">
    <text x="80" y="120">CLASSWIZ APP</text>
  </g>
</svg>
