<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Parallax Demo</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.hero{
    height:100vh;
    position:relative;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#0c1630;
}

.bg{
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at center,
    #1d4ed8 0%,
    #0c1630 70%);

    z-index:1;
}

.glow{
    position:absolute;

    width:900px;
    height:900px;

    border-radius:50%;

    background:rgba(59,130,246,.25);
    filter:blur(120px);

    z-index:2;
}

.product{
    position:relative;
    z-index:3;
}

.product img{
    width:500px;
    display:block;
}

.content{
    position:absolute;
    z-index:4;

    text-align:center;
    color:white;
}

.content h1{
    font-size:72px;
    margin-bottom:15px;
}

.content p{
    font-size:22px;
    opacity:.8;
}

.spacer{
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:60px;
}

.section2{
    background:white;
}

.section3{
    background:#f5f5f5;
}

</style>
</head>
<body>

<section class="hero">

    <div class="bg"></div>

    <div class="glow"></div>

    <div class="product">
        <img
        src="https://placehold.co/700x700/png"
        alt="">
    </div>

    <div class="content">
        <h1>CASIO FX-580VN X</h1>
        <p>Scroll xuống để xem hiệu ứng</p>
    </div>

</section>

<section class="spacer section2">
    OVERVIEW
</section>

<section class="spacer section3">
    FEATURES
</section>

<script>

gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({

    scrollTrigger:{
        trigger:".hero",

        start:"top top",

        end:"+=2000",

        scrub:true,

        pin:true
    }
});

tl.to(".bg",{
    scale:1.2,
    duration:1
},0);

tl.to(".glow",{
    y:-200,
    scale:1.5,
    duration:1
},0);

tl.to(".product img",{
    scale:1.4,
    y:-80,
    duration:1
},0);

tl.to(".content",{
    y:-200,
    opacity:0,
    duration:1
},0);

</script>

</body>
</html>
