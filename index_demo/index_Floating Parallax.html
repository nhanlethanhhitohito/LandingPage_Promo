<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Floating Parallax Demo</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  color: #111;
}

.hero {
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  background: linear-gradient(90deg, #c9dce9, #e6f2fb);
  display: flex;
  align-items: center;
}

.hero-inner {
  width: min(1200px, 90%);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 55% 45%;
  align-items: center;
}

.product-wrap {
  position: relative;
  height: 720px;
}

.product {
  position: absolute;
  left: 6%;
  bottom: -40px;
  width: min(520px, 42vw);
  height: 680px;
  border-radius: 34px;
  background: linear-gradient(145deg, #111827, #020617);
  color: white;
  display: grid;
  place-items: center;
  font-size: 64px;
  font-weight: 900;
  transform: rotate(-12deg);
  box-shadow: 0 40px 120px rgba(0,0,0,0.25);
  z-index: 2;
}

.hand {
  position: absolute;
  left: 18%;
  bottom: -120px;
  width: 360px;
  height: 420px;
  border-radius: 180px 180px 40px 40px;
  background: linear-gradient(145deg, #f0c4a5, #d89b7b);
  transform: rotate(-18deg);
  z-index: 1;
}

.content {
  position: relative;
  z-index: 3;
}

.content h1 {
  font-size: clamp(48px, 6vw, 88px);
  line-height: 1;
  margin-bottom: 20px;
}

.content .thin {
  font-weight: 300;
}

.content .bold {
  font-weight: 900;
}

.content p {
  max-width: 520px;
  font-size: 21px;
  line-height: 1.55;
}

.next {
  height: 100vh;
  display: grid;
  place-items: center;
  background: white;
  font-size: clamp(48px, 7vw, 96px);
}

@media (max-width: 768px) {
  .hero-inner {
    grid-template-columns: 1fr;
  }

  .product-wrap {
    height: 520px;
  }

  .product {
    width: 280px;
    height: 420px;
    font-size: 42px;
  }

  .hand {
    width: 230px;
    height: 300px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">

    <div class="product-wrap">
      <div class="hand"></div>
      <div class="product">CASIO</div>
    </div>

    <div class="content">
      <h1>
        CASIO<br>
        <span class="thin">Compact Size.</span><br>
        <span class="bold">BIG POSSIBILITIES.</span>
      </h1>

      <p>
        Kéo xuống nhẹ để thấy sản phẩm và bàn tay di chuyển lơ lửng.
        Đây là micro parallax: hiệu ứng rất nhỏ nhưng làm hero có cảm giác sống hơn.
      </p>
    </div>

  </div>
</section>

<section class="next">
  OVERVIEW
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

// Bàn tay + sản phẩm lơ lửng mạnh hơn một chút
gsap.to(".product-wrap", {
  y: -70,
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom top",
    scrub: true
  }
});

// Text cũng trôi nhẹ nhưng ít hơn
gsap.to(".content", {
  y: -25,
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom top",
    scrub: true
  }
});

// Background zoom rất nhẹ
gsap.to(".hero", {
  backgroundPosition: "50% 20%",
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom top",
    scrub: true
  }
});
</script>

</body>
</html>
