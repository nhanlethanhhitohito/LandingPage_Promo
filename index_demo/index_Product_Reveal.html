<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Reveal Demo</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: #050816;
  color: white;
}

.intro,
.next {
  height: 100vh;
  display: grid;
  place-items: center;
  text-align: center;
}

.intro h1,
.next h2 {
  font-size: clamp(42px, 7vw, 96px);
}

.reveal-section {
  height: 220vh;
  position: relative;
  background: radial-gradient(circle at center, #123c8c 0%, #050816 65%);
}

.stage {
  position: sticky;
  top: 0;
  height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
}

.product-wrap {
  position: relative;
  width: clamp(280px, 34vw, 520px);
  height: clamp(420px, 48vw, 720px);
  display: grid;
  place-items: center;
}

.product {
  width: 100%;
  height: 100%;
  border-radius: 36px;
  background: linear-gradient(145deg, #f8fafc, #94a3b8);
  color: #111827;
  display: grid;
  place-items: center;
  font-size: clamp(36px, 5vw, 78px);
  font-weight: 900;
  box-shadow: 0 40px 140px rgba(59, 130, 246, 0.5);

  clip-path: inset(0 0 100% 0);
  transform: translateY(120px) scale(0.9);
}

.light {
  position: absolute;
  width: 130%;
  height: 130%;
  border-radius: 50%;
  background: rgba(96, 165, 250, 0.3);
  filter: blur(90px);
  transform: scale(0.4);
  opacity: 0;
  z-index: -1;
}

.copy {
  position: absolute;
  bottom: 9vh;
  text-align: center;
  opacity: 0;
  transform: translateY(50px);
}

.copy h2 {
  font-size: clamp(38px, 6vw, 88px);
}

.copy p {
  margin-top: 12px;
  font-size: clamp(16px, 2vw, 24px);
  opacity: 0.75;
}
</style>
</head>

<body>

<section class="intro">
  <h1>Kéo xuống để reveal sản phẩm</h1>
</section>

<section class="reveal-section">
  <div class="stage">

    <div class="product-wrap">
      <div class="light"></div>
      <div class="product">CASIO</div>
    </div>

    <div class="copy">
      <h2>FX-580VN X</h2>
      <p>Sản phẩm xuất hiện theo thao tác cuộn</p>
    </div>

  </div>
</section>

<section class="next">
  <h2>Section tiếp theo</h2>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".reveal-section",
    start: "top top",
    end: "bottom bottom",
    scrub: true
  }
});

tl.to(".product", {
  clipPath: "inset(0 0 0% 0)",
  y: 0,
  scale: 1,
  duration: 1.2
});

tl.to(".light", {
  opacity: 1,
  scale: 1,
  duration: 1
}, 0.2);

tl.to(".product", {
  y: -80,
  scale: 1.08,
  duration: 1
});

tl.to(".copy", {
  opacity: 1,
  y: 0,
  duration: 1
}, "-=0.5");
</script>

</body>
</html>
