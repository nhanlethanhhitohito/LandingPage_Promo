<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pinned Hero Section Demo</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: #050816;
  color: white;
}

.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at center, #1d4ed8 0%, #050816 65%);
}

.hero-inner {
  height: 100%;
  display: grid;
  place-items: center;
  position: relative;
}

.product {
  width: clamp(260px, 35vw, 520px);
  height: clamp(360px, 45vw, 680px);
  border-radius: 36px;
  background: linear-gradient(145deg, #f8fafc, #94a3b8);
  color: #111827;
  display: grid;
  place-items: center;
  font-size: clamp(34px, 5vw, 76px);
  font-weight: 900;
  box-shadow: 0 40px 140px rgba(59, 130, 246, 0.45);
  z-index: 2;
}

.copy {
  position: absolute;
  text-align: center;
  z-index: 3;
  pointer-events: none;
}

.copy h1 {
  font-size: clamp(42px, 7vw, 96px);
  line-height: 1;
}

.copy p {
  margin-top: 16px;
  font-size: clamp(16px, 2vw, 24px);
  opacity: 0.8;
}

.step {
  position: absolute;
  right: 8vw;
  bottom: 10vh;
  font-size: clamp(18px, 2vw, 28px);
  opacity: 0;
  transform: translateY(40px);
  max-width: 360px;
}

.scroll-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0.65;
  font-size: 14px;
  letter-spacing: 2px;
}

.next {
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: white;
  color: #111827;
  text-align: center;
}

.next h2 {
  font-size: clamp(42px, 7vw, 96px);
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">

    <div class="copy">
      <h1>CASIO FX-580VN X</h1>
      <p>Hero được pin trong lúc bạn cuộn</p>
    </div>

    <div class="product">CASIO</div>

    <div class="step step-1">01. Máy đứng yên ở hero section.</div>
    <div class="step step-2">02. Khi cuộn, nội dung bên trong bắt đầu chuyển động.</div>
    <div class="step step-3">03. Hoàn tất animation rồi mới chuyển section.</div>

    <div class="scroll-hint">SCROLL</div>

  </div>
</section>

<section class="next">
  <div>
    <h2>OVERVIEW</h2>
    <p>Section này chỉ xuất hiện sau khi hero pin chạy xong.</p>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "+=2500",
    scrub: true,
    pin: true
  }
});

tl.to(".copy", {
  y: -180,
  opacity: 0,
  duration: 1
});

tl.to(".product", {
  scale: 1.25,
  y: -40,
  duration: 1
}, 0);

tl.to(".step-1", {
  opacity: 1,
  y: 0,
  duration: 0.6
});

tl.to(".step-1", {
  opacity: 0,
  y: -40,
  duration: 0.6
});

tl.to(".product", {
  x: -260,
  rotate: -6,
  scale: 0.95,
  duration: 1
});

tl.to(".step-2", {
  opacity: 1,
  y: 0,
  duration: 0.6
});

tl.to(".step-2", {
  opacity: 0,
  y: -40,
  duration: 0.6
});

tl.to(".product", {
  x: 0,
  rotate: 0,
  scale: 1.1,
  duration: 1
});

tl.to(".step-3", {
  opacity: 1,
  y: 0,
  duration: 0.8
});

tl.to(".scroll-hint", {
  opacity: 0,
  duration: 0.4
}, 0);
</script>

</body>
</html>
