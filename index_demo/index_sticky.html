<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pin Text Scroll Demo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    section {
      width: 100%;
    }

    .hero,
    .next-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .hero {
      background: linear-gradient(135deg, #111827, #020617);
    }

    .next-section {
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .hero h1,
    .next-section h2 {
      font-size: clamp(36px, 7vw, 90px);
      line-height: 1.1;
    }

    /* SECTION GIỮ MÀN HÌNH */
    .pin-text-section {
      height: 260vh; /* tăng số này nếu muốn giữ lâu hơn */
      background: #ffffff;
      position: relative;
    }

    .sticky-box {
      position: sticky;
      top: 0;
      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
    }

    .center-text {
      opacity: 0;
      transform: translateY(60px) scale(0.96);
      color: #111;
      font-size: clamp(38px, 7vw, 110px);
      line-height: 1.05;
      font-weight: 700;
      text-align: center;
      letter-spacing: -2px;
      max-width: 1000px;
      padding: 0 24px;
    }

    .small-note {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Hero Section<br>Casio Product</h1>
  </section>

  <section class="pin-text-section" id="pinText">
    <div class="sticky-box">
      <h2 class="center-text">
        Bên trong từng chi tiết
      </h2>

      <div class="small-note">
        SCROLL TO REVEAL
      </div>
    </div>
  </section>

  <section class="next-section">
    <h2>Section tiếp theo<br>Exploded View</h2>
  </section>

  <script>
    const section = document.querySelector("#pinText");
    const text = document.querySelector(".center-text");
    const note = document.querySelector(".small-note");

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function animatePinText() {
      const rect = section.getBoundingClientRect();
      const scrollDistance = section.offsetHeight - window.innerHeight;

      let progress = -rect.top / scrollDistance;
      progress = clamp(progress, 0, 1);

      /*
        progress:
        0   = mới vào section
        0.5 = đang ở giữa section
        1   = kết thúc section
      */

      let textOpacity = 0;
      let textY = 60;
      let textScale = 0.96;

      if (progress < 0.35) {
        // chữ bắt đầu hiện
        const p = progress / 0.35;
        textOpacity = p;
        textY = 60 - p * 60;
        textScale = 0.96 + p * 0.04;
      } else if (progress < 0.75) {
        // chữ đứng yên ở giữa
        textOpacity = 1;
        textY = 0;
        textScale = 1;
      } else {
        // chữ mờ nhẹ trước khi qua section tiếp theo
        const p = (progress - 0.75) / 0.25;
        textOpacity = 1 - p;
        textY = -40 * p;
        textScale = 1 + p * 0.03;
      }

      text.style.opacity = textOpacity;
      text.style.transform =
        `translateY(${textY}px) scale(${textScale})`;

      note.style.opacity = 1 - progress * 1.5;
    }

    window.addEventListener("scroll", animatePinText);
    window.addEventListener("resize", animatePinText);

    animatePinText();
  </script>

</body>
</html>
