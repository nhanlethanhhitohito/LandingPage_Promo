<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Micro Parallax Demo</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  color: #111;
}

.hero {
  min-height: 100vh;
  overflow: hidden;
  background: linear-gradient(90deg, #c9dce9, #eaf5fb);
  display: flex;
  align-items: center;
}

.hero-inner {
  width: min(1220px, 90%);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 55% 45%;
  align-items: center;
}

.visual {
  position: relative;
  height: 720px;
}

.phone {
  position: absolute;
  left: 12%;
  bottom: 70px;
  width: 360px;
  height: 560px;
  border-radius: 34px;
  background: linear-gradient(145deg, #111827, #020617);
  color: white;
  display: grid;
  place-items: center;
  font-size: 56px;
  font-weight: 900;
  transform: rotate(-12deg);
  box-shadow: 0 40px 100px rgba(0,0,0,0.25);
  z-index: 2;
}

.hand {
  position: absolute;
  left: 23%;
  bottom: -80px;
  width: 250px;
  height: 360px;
  border-radius: 140px 140px 40px 40px;
  background: linear-gradient(145deg, #f0c4a5, #d89b7b);
  transform: rotate(-18deg);
  z-index: 1;
}

.content h1 {
  font-size: clamp(48px, 6vw, 88px);
  line-height: 1;
  margin-bottom: 20px;
}

.content .thin {
  font-weight: 300;
}

.content .bold {
  font-weight: 900;
}

.content p {
  max-width: 520px;
  font-size: 21px;
  line-height: 1.55;
}

.next {
  height: 100vh;
  display: grid;
  place-items: center;
  background: white;
  font-size: clamp(48px, 7vw, 96px);
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">

    <div class="visual">
      <div class="hand"></div>
      <div class="phone">CASIO</div>
    </div>

    <div class="content">
      <h1>
        CASIO<br>
        <span class="thin">Compact Size.</span><br>
        <span class="bold">BIG POSSIBILITIES.</span>
      </h1>

      <p>
        Kéo xuống một chút rồi kéo lên lại. Bạn sẽ thấy sản phẩm chỉ dịch chuyển rất nhẹ,
        tạo cảm giác đang lơ lửng nhưng không gây rối mắt.
      </p>
    </div>

  </div>
</section>

<section class="next">
  OVERVIEW
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/*
  Micro Parallax:
  - Không pin
  - Không zoom mạnh
  - Không reveal lớn
  - Chỉ dịch nhẹ theo scroll
*/

gsap.to(".phone", {
  y: -32,
  rotate: -10,
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom top",
    scrub: true
  }
});

gsap.to(".hand", {
  y: -18,
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom top",
    scrub: true
  }
});

gsap.to(".content", {
  y: -12,
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom top",
    scrub: true
  }
});
</script>

</body>
</html>
