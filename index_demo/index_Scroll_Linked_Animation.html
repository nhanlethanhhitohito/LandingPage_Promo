<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scroll-Linked Animation Demo</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: #050816;
  color: white;
}

.intro,
.outro {
  height: 100vh;
  display: grid;
  place-items: center;
  font-size: clamp(36px, 6vw, 80px);
  text-align: center;
}

.scroll-demo {
  height: 300vh;
  position: relative;
  background: linear-gradient(180deg, #050816, #0b1f4d, #050816);
}

.stage {
  position: sticky;
  top: 0;
  height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
}

.product {
  width: clamp(260px, 35vw, 520px);
  height: clamp(260px, 35vw, 520px);
  border-radius: 32px;
  background: linear-gradient(145deg, #ffffff, #cfd8ff);
  color: #111827;
  display: grid;
  place-items: center;
  font-size: clamp(32px, 5vw, 72px);
  font-weight: 800;
  box-shadow: 0 40px 120px rgba(59, 130, 246, 0.45);
  transform-origin: center;
}

.text {
  position: absolute;
  bottom: 12vh;
  text-align: center;
  opacity: 0;
  transform: translateY(40px);
}

.text h1 {
  font-size: clamp(36px, 6vw, 86px);
}

.text p {
  margin-top: 12px;
  font-size: clamp(16px, 2vw, 24px);
  opacity: 0.75;
}

.progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 6px;
  width: 0%;
  background: white;
  z-index: 99;
}
</style>
</head>

<body>

<div class="progress"></div>

<section class="intro">
  Kéo xuống<br>để điều khiển animation
</section>

<section class="scroll-demo">
  <div class="stage">
    <div class="product">CASIO</div>

    <div class="text">
      <h1>Scroll-Linked</h1>
      <p>Cuộn tới đâu, hiệu ứng chạy tới đó</p>
    </div>
  </div>
</section>

<section class="outro">
  Section tiếp theo
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".scroll-demo",
    start: "top top",
    end: "bottom bottom",
    scrub: true,
    onUpdate: (self) => {
      gsap.set(".progress", {
        width: self.progress * 100 + "%"
      });
    }
  }
});

tl.to(".product", {
  scale: 1.4,
  rotate: 8,
  y: -120,
  duration: 1
});

tl.to(".product", {
  x: -320,
  scale: 0.85,
  rotate: -6,
  duration: 1
});

tl.to(".text", {
  opacity: 1,
  y: 0,
  duration: 1
}, "-=0.6");

tl.to(".product", {
  x: 320,
  rotate: 6,
  duration: 1
});

tl.to(".text", {
  opacity: 0,
  y: -60,
  duration: 1
}, "-=0.6");
</script>

</body>
</html>
